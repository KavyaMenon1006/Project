<!doctype html>
<html>
<head>
    <title>
        Game
    </title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>
        Rock Paper Scissors
    </h1>
    <div class="choices">
        <div class="choice">
            <img src="./images/rock.png" alt="Rock" height="100px" width="150px" >
        </div>
        <div class="choice">
            <img src="./images/paper.png" alt="Paper" id="paper" height="150px" width="150px" >
        </div>
        <div class="choice">
            <img src="./images/scissors.png" id="scissors" height="100px" width="150px">
        </div>
    </div>
    <div class="score_board">
        <div class="score">
            <p id="user-score">0</p>
            <p>user</p>
        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p>computer</p>
        </div>
    </div> 
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div> 
    <script src="./script.js"></script>
            
</body>
</html>
